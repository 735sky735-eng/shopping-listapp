<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }
    .input-row button:active { transform: scale(0.97); }
    .input-row button:disabled { background: #a0aec0; cursor: default; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat {
      font-size: 0.8rem;
      color: #718096;
      background: #f7fafc;
      border-radius: 8px;
      padding: 4px 10px;
    }

    .stat span { font-weight: 700; color: #4a5568; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      background: #fff;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #9ae6b4;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: color 0.2s;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }
    .delete-btn:disabled { opacity: 0.4; cursor: default; }

    .empty {
      text-align: center;
      color: #cbd5e0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #fed7d7;
      border-radius: 10px;
      color: #e53e3e;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      color: #718096;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들을 기록하세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off" />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <div class="stat">전체 <span id="totalCount">0</span>개</div>
      <div class="stat">완료 <span id="doneCount">0</span>개</div>
      <div class="stat">남은 항목 <span id="remainCount">0</span>개</div>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="emptyMsg">리스트가 비어 있습니다.</p>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" disabled>
      완료 항목 모두 삭제
    </button>
  </div>

  <script>
    const SUPABASE_URL = 'https://ikzeyxtgebfsurtnsfvw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlremv5eHRnZWJmc3VydG5zZnZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIwMTAyMzYsImV4cCI6MjA1NzU4NjIzNn0.QcOjtb2HboqabbAPlmdB59EQP2dMnQq2sov2wsjx4bI';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let loading = false;

    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const clearBtn = document.getElementById('clearBtn');
    const addBtn = document.getElementById('addBtn');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function setLoading(val) {
      loading = val;
      addBtn.disabled = val;
      clearBtn.disabled = val || items.filter(i => i.checked).length === 0;
      document.querySelectorAll('.delete-btn, li input[type="checkbox"]').forEach(el => {
        el.disabled = val;
      });
    }

    async function loadItems() {
      setLoading(true);
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at');
      if (!error) items = data;
      setLoading(false);
      render();
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text || loading) return;
      input.value = '';
      setLoading(true);
      await db.from('shopping_items').insert({ text, checked: false });
      await loadItems();
      input.focus();
    }

    async function toggleItem(id, checked) {
      if (loading) return;
      setLoading(true);
      await db.from('shopping_items').update({ checked }).eq('id', id);
      await loadItems();
    }

    async function deleteItem(id) {
      if (loading) return;
      setLoading(true);
      await db.from('shopping_items').delete().eq('id', id);
      await loadItems();
    }

    async function clearChecked() {
      if (loading) return;
      setLoading(true);
      await db.from('shopping_items').delete().eq('checked', true);
      await loadItems();
    }

    function render() {
      list.replaceChildren();
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('remainCount').textContent = total - done;
      emptyMsg.style.display = total === 0 ? 'block' : 'none';
      clearBtn.disabled = done === 0;

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggleItem(item.id, cb.checked);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => deleteItem(item.id);

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    loadItems();
  </script>
</body>
</html>
